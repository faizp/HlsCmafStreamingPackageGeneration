video:
  pix_fmt: yuv420p
  max_height: 1440
  max_fps: 30
  sc_threshold: 0
  closed_gop: true
  renditions: [1440, 1080, 720, 480]
  profiles:
    1440:
      maxrate: "9000k"
      bufsize: "18000k"
    1080:
      maxrate: "4500k"
      bufsize: "9000k"
    720:
      maxrate: "3000k"
      bufsize: "6000k"
    480:
      maxrate: "1500k"
      bufsize: "3000k"
    default:
      maxrate: "1000k"
      bufsize: "2000k"
  encoder_preference: [nvenc, videotoolbox, cpu]
  encoders:
    cpu:
      codec: libx264
      preset: medium
      crf: 23
    nvenc:
      codec: h264_nvenc
      preset: p5
      cq: 20
      rc: vbr
      hwaccel: cuda
      hwaccel_output_format: cuda
      scale_filter: scale_cuda
      extra_args: ["-spatial-aq", "1", "-temporal-aq", "1", "-aq-strength", "13"]
    videotoolbox:
      codec: h264_videotoolbox
      quality: 65
      realtime: false
      scale_filter: scale
      extra_args: []

audio:
  codec: aac
  bitrate: "128k"
  channels: 2
  sample_rate: 48000

packaging:
  segment_duration: 4
  segment_type: fmp4
  hls_version: 7

output:
  layout: "vod/{asset_id}/{version}"
